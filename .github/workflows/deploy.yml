name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          set -e
          sudo runuser -u nodeapp -- git -C /opt/secure-id-process fetch origin
          sudo runuser -u nodeapp -- git -C /opt/secure-id-process reset --hard origin/main

      - name: Install dependencies
        run: sudo runuser -u nodeapp -- npm --prefix /opt/secure-id-process install --omit=dev

      - name: Apply service hardening
        run: |
          sudo mkdir -p /etc/systemd/system/verification-portal.service.d
          printf '[Service]\nMemorySwapMax=0\n' | sudo tee /etc/systemd/system/verification-portal.service.d/no-swap.conf > /dev/null
          sudo systemctl daemon-reload

      - name: Restart service
        run: |
          sudo systemctl restart verification-portal
          sudo systemctl is-active --quiet verification-portal && echo "Service is running" || (echo "Service failed to start" && exit 1)
