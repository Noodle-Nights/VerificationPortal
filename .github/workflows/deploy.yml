name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          set -e
          sudo runuser -u nodeapp -- git -C /opt/secure-id-process pull origin main

      - name: Install dependencies
        run: sudo runuser -u nodeapp -- npm --prefix /opt/secure-id-process install --omit=dev

      - name: Restart service
        run: |
          sudo systemctl restart verification-portal
          sudo systemctl is-active --quiet verification-portal && echo "Service is running" || (echo "Service failed to start" && exit 1)
