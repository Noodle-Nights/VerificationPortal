# ─── nginx reverse proxy for secure-id-process ───────────────────────────────
#
# Assumptions:
#   - Node.js app runs on 127.0.0.1:3000
#   - TLS certificate managed by Certbot / Let's Encrypt
#   - Replace "yourdomain.com" with your actual domain throughout
#
# Placement:  /etc/nginx/sites-available/secureverify
# Enable with: sudo ln -s /etc/nginx/sites-available/secureverify /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx

# ─── Rate-limit zones (defined in http{} context) ────────────────────────────
# If you already have an http block in nginx.conf, move these two lines there.
# limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=general_zone:10m rate=60r/m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443      ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # Modern TLS — TLS 1.2 + 1.3 only, strong ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session resumption (improves performance)
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=60s;
    resolver_timeout 2s;

    # ── Security Headers ─────────────────────────────────────────────────────
    # HSTS — once set, browsers enforce HTTPS for max-age seconds.
    # Remove "preload" until you're sure, then submit to https://hstspreload.org
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # These headers complement the CSP set by the Node.js app (helmet).
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Upload size limit ────────────────────────────────────────────────────
    # Slightly above the 10 MB app limit to avoid nginx truncating before
    # multer can return a proper 413 error message.
    client_max_body_size 12m;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Log to separate files so sensitive request paths are isolated.
    access_log /var/log/nginx/secureverify_access.log;
    error_log  /var/log/nginx/secureverify_error.log warn;

    # ── Rate limiting for upload endpoint ────────────────────────────────────
    # Additional nginx-level rate limiting before requests reach Node.js.
    # Node.js also rate-limits internally; this is a defence-in-depth layer.
    location /api/upload {
        limit_req zone=upload_zone burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Staff image endpoint — no caching ────────────────────────────────────
    location /api/staff/image/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Ensure nginx never caches the sensitive image response
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header         Pragma        "no-cache"                            always;
    }

    # ── Discord OAuth callback ────────────────────────────────────────────────
    location /auth/discord/ {
        limit_req zone=general_zone burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Default proxy pass ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (not used here but good practice)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;

        # Do not buffer proxied responses (better for streaming/large files)
        proxy_buffering off;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Cache CSS/JS for 1 hour (short — staff.js/upload.js may change on updates)
    location ~* \.(css|js)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=3600";
    }
}
