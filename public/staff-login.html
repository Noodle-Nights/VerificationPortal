<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Noodle Nights</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <header class="top-nav">
    <div class="nav-brand">
      <span class="nav-icon">🔒</span>
      <span>Noodle Nights Verification Portal</span>
      <span class="nav-badge">Staff Portal</span>
    </div>
  </header>

  <main>
    <div class="card card-center">
      <div class="card-icon">🛡️</div>
      <h1>Staff Access</h1>
      <p class="subtitle">
        Sign in with Discord to access the verification portal.<br>
        You must be a member of the authorised server and hold the required role.
      </p>

      <a href="/auth/discord" class="btn btn-discord">
        <svg class="discord-logo" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" fill="currentColor"/>
        </svg>
        Sign in with Discord
      </a>

      <div class="login-error" id="loginError" hidden></div>
    </div>
  </main>

  <footer>
    <p class="footer-copy">
      &copy; <span id="footerYear"></span> Noodle Nights &nbsp;&middot;&nbsp;
      Build <span id="footerHash">&#x2014;</span>
    </p>
  </footer>

  <script src="/js/footer.js"></script>
  <script>
    // Show OAuth error from URL query param, then clean the URL
    const _params = new URLSearchParams(window.location.search);
    const _error  = _params.get('error');
    if (_error) {
      const _messages = {
        not_configured:      'Discord auth is not configured on this server.',
        invalid_state:       'Security check failed. Please try signing in again.',
        invalid_code:        'Invalid authorisation code. Please try again.',
        token_failed:        'Could not exchange Discord token. Please try again.',
        token_missing:       'Discord did not return a token. Please try again.',
        user_fetch_failed:   'Could not retrieve your Discord profile.',
        not_in_guild:        'You must be a member of the authorised Discord server.',
        missing_role:        'You do not have the required role to access this portal.',
        member_fetch_failed: 'Could not verify your server membership. Please try again.',
        session_error:       'Session error. Please try signing in again.',
        internal_error:      'An internal error occurred. Please try again.',
        access_denied:       'Access was denied. Authorise the app to continue.',
      };
      const _el = document.getElementById('loginError');
      _el.textContent = _messages[_error] || `Sign-in failed (${_error}). Please try again.`;
      _el.hidden = false;
      window.history.replaceState({}, '', '/staff/login');
    }
  </script>
</body>
</html>
